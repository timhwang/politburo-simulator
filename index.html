<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survive the Politburo</title>
<meta name="description" content="Can you survive 22 Soviet Party Congresses? A historically-accurate political survival game spanning 1918-1990.">
<meta property="og:title" content="Survive the Politburo">
<meta property="og:description" content="Can you survive 22 Soviet Party Congresses? A historically-accurate political survival game spanning 1918-1990.">
<meta property="og:image" content="https://timhwang.github.io/politburo-simulator/images/share-card.png">
<meta property="og:url" content="https://timhwang.github.io/politburo-simulator/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Survive the Politburo">
<meta name="twitter:description" content="Can you survive 22 Soviet Party Congresses? A historically-accurate political survival game spanning 1918-1990.">
<meta name="twitter:image" content="https://timhwang.github.io/politburo-simulator/images/share-card.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Special+Elite&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0a0a;
    color: #d4c5a9;
    font-family: 'IM Fell English', serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
  }

  #game-container {
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    padding: 40px 20px 20px;
    border-bottom: 2px solid #8b0000;
    margin-bottom: 30px;
  }

  .header h1 {
    font-family: 'Special Elite', cursive;
    font-size: 2.5em;
    color: #c41e1e;
    text-transform: uppercase;
    letter-spacing: 4px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
  }

  .header .subtitle {
    font-style: italic;
    color: #8a7a5a;
    margin-top: 8px;
    font-size: 1.1em;
  }

  .star {
    color: #c41e1e;
    font-size: 1.5em;
  }

  #narrative {
    background: rgba(30, 15, 10, 0.8);
    border: 1px solid #3a2a1a;
    border-left: 4px solid #8b0000;
    padding: 25px 30px;
    margin-bottom: 20px;
    line-height: 1.8;
    font-size: 1.05em;
    min-height: 120px;
  }

  #narrative p { margin-bottom: 12px; }
  #narrative p:last-child { margin-bottom: 0; }

  .congress-banner {
    background: linear-gradient(135deg, #8b0000, #5a0000);
    color: #ffd700;
    text-align: center;
    padding: 15px;
    margin-bottom: 20px;
    font-family: 'Special Elite', cursive;
    font-size: 1.3em;
    letter-spacing: 2px;
    border: 1px solid #ffd700;
  }

  .congress-banner .year {
    font-size: 0.8em;
    color: #d4c5a9;
    display: block;
    margin-top: 4px;
    letter-spacing: 1px;
  }

  #choices {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
  }

  .choice-btn {
    background: rgba(40, 20, 15, 0.9);
    border: 1px solid #5a3a2a;
    color: #d4c5a9;
    padding: 15px 20px;
    font-family: 'IM Fell English', serif;
    font-size: 1em;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    line-height: 1.5;
  }

  .choice-btn:hover {
    background: rgba(139, 0, 0, 0.3);
    border-color: #8b0000;
    color: #fff;
  }

  .choice-btn:active {
    background: rgba(139, 0, 0, 0.5);
  }

  .choice-btn .choice-label {
    color: #c41e1e;
    font-weight: bold;
    margin-right: 8px;
  }

  #status-bar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
    font-size: 0.9em;
  }

  .stat-box {
    background: rgba(30, 15, 10, 0.8);
    border: 1px solid #3a2a1a;
    padding: 10px 15px;
    text-align: center;
  }

  .stat-label {
    color: #8a7a5a;
    font-size: 0.85em;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .stat-effect {
    font-size: 0.65em;
    margin-top: 4px;
    line-height: 1.3;
    min-height: 1.3em;
  }

  .stat-value {
    color: #ffd700;
    font-size: 1.3em;
    font-family: 'Special Elite', cursive;
    margin-top: 4px;
  }

  .stat-bar {
    width: 100%;
    height: 6px;
    background: #2a1a0a;
    margin-top: 6px;
    border-radius: 3px;
    overflow: hidden;
  }

  .stat-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s;
  }

  .loyalty-fill { background: #c41e1e; }
  .cunning-fill { background: #ffd700; }
  .reputation-fill { background: #4a9eff; }

  #character-card {
    background: rgba(30, 15, 10, 0.9);
    border: 1px solid #5a3a2a;
    padding: 20px;
    margin-bottom: 20px;
  }

  #character-card h3 {
    color: #c41e1e;
    font-family: 'Special Elite', cursive;
    font-size: 1.2em;
    margin-bottom: 10px;
  }

  .char-detail {
    color: #8a7a5a;
    margin-bottom: 5px;
    font-size: 0.95em;
  }

  .char-detail span { color: #d4c5a9; }

  .fate-executed { color: #ff4444; }
  .fate-survived { color: #44ff44; }
  .fate-suicide { color: #ffaa44; }
  .fate-assassinated { color: #ff44ff; }

  #outcome-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }

  #outcome-overlay.active { display: flex; }

  .outcome-card {
    background: #1a0a0a;
    border: 2px solid #8b0000;
    padding: 40px;
    max-width: 650px;
    max-height: 80vh;
    overflow-y: auto;
    text-align: left;
  }

  .outcome-card h2 {
    text-align: center;
  }

  .outcome-card h3 {
    font-family: 'Special Elite', cursive;
    color: #ffd700;
    font-size: 1.3em;
    margin: 15px 0 10px;
    text-align: center;
  }

  .outcome-card h2 {
    font-family: 'Special Elite', cursive;
    font-size: 2em;
    margin-bottom: 20px;
  }

  .outcome-card.purged h2 { color: #ff4444; }
  .outcome-card.survived h2 { color: #ffd700; }

  .outcome-card p {
    margin-bottom: 15px;
    line-height: 1.7;
  }

  .outcome-card button {
    margin-top: 20px;
    background: #8b0000;
    color: #ffd700;
    border: 1px solid #ffd700;
    padding: 12px 30px;
    font-family: 'Special Elite', cursive;
    font-size: 1.1em;
    cursor: pointer;
    letter-spacing: 2px;
  }

  .outcome-card button:hover {
    background: #a00000;
  }

  .typewriter {
    overflow: hidden;
    animation: fadeIn 0.5s ease-in;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .historical-note {
    font-size: 0.85em;
    color: #6a5a3a;
    font-style: italic;
    border-top: 1px solid #3a2a1a;
    padding-top: 10px;
    margin-top: 15px;
  }

  .character-select {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-bottom: 20px;
  }

  .char-option {
    background: rgba(40, 20, 15, 0.9);
    border: 1px solid #5a3a2a;
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .char-option:hover {
    border-color: #c41e1e;
    background: rgba(139, 0, 0, 0.2);
  }

  .char-option h4 {
    color: #ffd700;
    font-family: 'Special Elite', cursive;
    font-size: 1.1em;
    margin-bottom: 8px;
  }

  .char-option .char-meta {
    color: #8a7a5a;
    font-size: 0.9em;
    line-height: 1.5;
  }

  .char-option .char-fate {
    margin-top: 8px;
    font-size: 0.85em;
    font-style: italic;
  }

  .congress-progress {
    display: flex;
    gap: 3px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .congress-pip {
    width: 28px;
    height: 8px;
    background: #2a1a0a;
    border: 1px solid #3a2a1a;
  }

  .congress-pip.completed { background: #4a9eff; border-color: #4a9eff; }
  .congress-pip.current { background: #ffd700; border-color: #ffd700; }
  .congress-pip.failed { background: #ff4444; border-color: #ff4444; }

  .event-log {
    max-height: 150px;
    overflow-y: auto;
    background: rgba(20, 10, 5, 0.8);
    border: 1px solid #2a1a0a;
    padding: 10px 15px;
    margin-bottom: 20px;
    font-size: 0.85em;
  }

  .event-log p {
    color: #6a5a3a;
    margin-bottom: 4px;
    padding-left: 10px;
    border-left: 2px solid #3a2a1a;
  }

  .event-log p.important { color: #c41e1e; border-left-color: #c41e1e; }

  .scene-canvas, .scene-img {
    width: 100%;
    height: auto;
    max-height: 300px;
    margin-bottom: 20px;
    border: 1px solid #3a2a1a;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #1a0a0a;
    object-fit: cover;
  }

  .portrait-canvas, .portrait-img {
    width: 80px;
    height: 90px;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 1px solid #5a3a2a;
    background: #2a1a0a;
    object-fit: cover;
  }

  .portrait-wrapper {
    display: inline-block;
  }

  .char-option .portrait-wrapper,
  .char-option .portrait-canvas,
  .char-option .portrait-img {
    float: left;
    margin-right: 12px;
    margin-bottom: 5px;
  }

  .char-option::after { content:''; display:table; clear:both; }

  #character-card .portrait-wrapper,
  #character-card .portrait-canvas,
  #character-card .portrait-img {
    float: left;
    margin-right: 15px;
    margin-bottom: 5px;
  }

  #character-card::after { content:''; display:table; clear:both; }

  /* ===== FACTION TRACKS ===== */
  .faction-tracks {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 15px;
    font-size: 0.85em;
  }
  .faction-track {
    background: rgba(30, 15, 10, 0.8);
    border: 1px solid #3a2a1a;
    padding: 8px 12px;
  }
  .faction-track-label {
    display: flex;
    justify-content: space-between;
    color: #8a7a5a;
    font-size: 0.8em;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .faction-track-bar {
    width: 100%;
    height: 8px;
    background: linear-gradient(to right, #4a9eff, #2a1a0a, #ff4444);
    border-radius: 4px;
    position: relative;
  }
  .faction-track-marker {
    position: absolute;
    top: -2px;
    width: 4px;
    height: 12px;
    background: #ffd700;
    border-radius: 2px;
    transform: translateX(-50%);
    transition: left 0.5s;
  }

  /* ===== ALLIANCES ===== */
  .alliances-panel {
    background: rgba(30, 15, 10, 0.8);
    border: 1px solid #3a2a1a;
    padding: 12px 15px;
    margin-bottom: 15px;
  }
  .alliances-panel h4 {
    color: #c41e1e;
    font-family: 'Special Elite', cursive;
    font-size: 0.95em;
    margin-bottom: 8px;
  }
  .alliance-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .alliance-chip {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.8em;
    cursor: default;
  }
  .alliance-chip.ally {
    background: rgba(68, 255, 68, 0.15);
    border: 1px solid #44ff44;
    color: #44ff44;
  }
  .alliance-chip.rival {
    background: rgba(255, 68, 68, 0.15);
    border: 1px solid #ff4444;
    color: #ff4444;
  }
  .alliance-chip.neutral {
    background: rgba(170, 170, 170, 0.1);
    border: 1px solid #555;
    color: #888;
  }

  /* ===== DOSSIER EVENT ===== */
  .dossier-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.9);
    z-index: 90;
    justify-content: center;
    align-items: center;
  }
  .dossier-overlay.active { display: flex; }
  .dossier-card {
    background: #1a1a0a;
    border: 2px solid #8a7a3a;
    padding: 30px 35px;
    max-width: 650px;
    max-height: 80vh;
    overflow-y: auto;
    font-family: 'Special Elite', cursive;
  }
  .dossier-card h2 {
    color: #ffd700;
    font-size: 1.3em;
    margin-bottom: 5px;
    letter-spacing: 2px;
  }
  .dossier-card .dossier-type {
    color: #c41e1e;
    font-size: 0.8em;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 15px;
  }
  .dossier-card .dossier-text {
    font-family: 'IM Fell English', serif;
    line-height: 1.7;
    margin-bottom: 20px;
    color: #d4c5a9;
  }
  .dossier-card .dossier-stamp {
    color: #c41e1e;
    font-size: 0.7em;
    text-transform: uppercase;
    letter-spacing: 4px;
    text-align: right;
    margin-top: 15px;
    opacity: 0.6;
  }

  /* ===== CRISIS EVENT ===== */
  .crisis-banner {
    background: linear-gradient(135deg, #ff0000, #8b0000);
    color: #fff;
    text-align: center;
    padding: 12px;
    margin-bottom: 15px;
    font-family: 'Special Elite', cursive;
    font-size: 1.2em;
    letter-spacing: 3px;
    animation: crisis-flash 1s ease-in-out 3;
    border: 2px solid #ffd700;
  }
  @keyframes crisis-flash {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  /* ===== PRAVDA NEWSPAPER ===== */
  .pravda-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    z-index: 80;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .pravda-overlay.active { display: flex; }
  .pravda-paper {
    background: #f5e6c8;
    color: #1a1a1a;
    max-width: 600px;
    width: 100%;
    padding: 30px;
    font-family: 'Special Elite', cursive;
    box-shadow: 5px 5px 20px rgba(0,0,0,0.5);
    max-height: 80vh;
    overflow-y: auto;
  }
  .pravda-header {
    text-align: center;
    border-bottom: 3px solid #1a1a1a;
    padding-bottom: 10px;
    margin-bottom: 15px;
  }
  .pravda-header h1 {
    font-size: 2.5em;
    color: #8b0000;
    letter-spacing: 6px;
    margin: 0;
    text-transform: uppercase;
  }
  .pravda-header .pravda-date {
    font-size: 0.8em;
    color: #555;
    margin-top: 4px;
  }
  .pravda-header .pravda-motto {
    font-size: 0.7em;
    color: #8b0000;
    font-style: italic;
  }
  .pravda-headline {
    font-size: 1.4em;
    font-weight: bold;
    text-align: center;
    margin: 15px 0 10px;
    line-height: 1.3;
    color: #1a1a1a;
  }
  .pravda-subhead {
    font-size: 0.95em;
    text-align: center;
    color: #444;
    margin-bottom: 15px;
    font-style: italic;
  }
  .pravda-body {
    font-family: 'IM Fell English', serif;
    font-size: 0.9em;
    line-height: 1.6;
    color: #333;
    column-count: 2;
    column-gap: 20px;
    margin-bottom: 15px;
  }
  .pravda-body p { margin-bottom: 8px; }
  .pravda-sidebar {
    border-top: 2px solid #1a1a1a;
    padding-top: 10px;
    font-size: 0.8em;
    color: #555;
    text-align: center;
  }
  .pravda-dismiss {
    display: block;
    margin: 15px auto 0;
    background: #8b0000;
    color: #f5e6c8;
    border: none;
    padding: 10px 30px;
    font-family: 'Special Elite', cursive;
    font-size: 1em;
    cursor: pointer;
    letter-spacing: 2px;
  }
  .pravda-dismiss:hover { background: #a00000; }

  /* ===== DIFFICULTY MODES ===== */
  .mode-select {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 15px;
  }
  .mode-option {
    background: rgba(40, 20, 15, 0.9);
    border: 1px solid #5a3a2a;
    padding: 15px 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-option:hover {
    border-color: #c41e1e;
    background: rgba(139, 0, 0, 0.2);
  }
  .mode-option h4 {
    color: #ffd700;
    font-family: 'Special Elite', cursive;
    margin-bottom: 4px;
  }
  .mode-option .mode-desc {
    color: #8a7a5a;
    font-size: 0.9em;
  }
  .mode-option.selected {
    border-color: #ffd700;
    background: rgba(255, 215, 0, 0.1);
  }

  /* ===== ALLIANCE CHOICE DURING CONGRESS ===== */
  .alliance-actions {
    margin-top: 15px;
    padding-top: 15px;
    border-top: 1px solid #3a2a1a;
  }
  .alliance-actions h4 {
    color: #8a7a5a;
    font-size: 0.85em;
    margin-bottom: 8px;
  }
  .alliance-btn {
    display: inline-block;
    padding: 8px 14px;
    margin: 4px;
    background: rgba(30, 15, 10, 0.8);
    border: 1px solid #3a2a1a;
    color: #d4c5a9;
    font-family: 'IM Fell English', serif;
    font-size: 0.85em;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    min-width: 180px;
  }
  .alliance-btn:hover {
    border-color: #44ff44;
    color: #44ff44;
  }
  .alliance-btn.betray:hover {
    border-color: #ff4444;
    color: #ff4444;
  }

  /* ===== POLITBURO TRACKER ===== */
  .politburo-tracker {
    background: rgba(30, 15, 10, 0.8);
    border: 1px solid #3a2a1a;
    padding: 12px 15px;
    margin-bottom: 15px;
  }
  .politburo-tracker h4 {
    color: #c41e1e;
    font-family: 'Special Elite', cursive;
    font-size: 0.95em;
    margin-bottom: 10px;
  }
  .tracker-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: flex-start;
  }
  .tracker-member {
    position: relative;
    width: 52px;
    text-align: center;
    transition: opacity 0.5s;
  }
  .tracker-member .tracker-portrait {
    width: 44px;
    height: 50px;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 2px solid #5a3a2a;
    object-fit: cover;
    background: #2a1a0a;
  }
  .tracker-member .tracker-name {
    font-size: 0.55em;
    color: #8a7a5a;
    margin-top: 2px;
    line-height: 1.1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 52px;
  }
  .tracker-member.purged {
    opacity: 0.4;
  }
  .tracker-member.purged .tracker-portrait {
    border-color: #ff4444;
    filter: grayscale(100%) brightness(0.5);
  }
  .tracker-member.purged .tracker-name {
    color: #ff4444;
    text-decoration: line-through;
  }
  .tracker-member.purged::after {
    content: '✕';
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: #ff4444;
    font-size: 1.6em;
    font-weight: bold;
    text-shadow: 0 0 4px rgba(0,0,0,0.8);
    pointer-events: none;
  }
  .tracker-member.new-member .tracker-portrait {
    border-color: #44ff44;
    box-shadow: 0 0 6px rgba(68, 255, 68, 0.3);
  }
  .tracker-member.new-member .tracker-name {
    color: #44ff44;
  }
  .tracker-member.is-player .tracker-portrait {
    border-color: #ffd700;
    box-shadow: 0 0 6px rgba(255, 215, 0, 0.4);
  }
  .tracker-member.is-player .tracker-name {
    color: #ffd700;
    font-weight: bold;
  }
  .tracker-legend {
    display: flex;
    gap: 12px;
    margin-top: 8px;
    font-size: 0.7em;
    color: #6a5a3a;
  }
  .tracker-legend span::before {
    content: '';
    display: inline-block;
    width: 8px;
    height: 8px;
    margin-right: 3px;
    vertical-align: middle;
    border-radius: 50%;
  }
  .tracker-legend .legend-new::before { background: #44ff44; }
  .tracker-legend .legend-purged::before { background: #ff4444; }
  .tracker-legend .legend-player::before { background: #ffd700; }

function getPortraitKey(member) {
  return member.n.toLowerCase().replace(/\s+/g, '');
}

function renderPortraitElement(containerId, member) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const key = getPortraitKey(member);
  if (portraitImages.has(key)) {
    const img = document.createElement('img');
    img.className = 'portrait-img';
    img.src = `images/portraits/${key}.png`;
    img.onerror = function() {
      container.innerHTML = '';
      const cv = document.createElement('canvas');
      cv.width = 80; cv.height = 90; cv.className = 'portrait-canvas';
      container.appendChild(cv);
      renderPortrait(cv, member);
    };
    container.appendChild(img);
  } else {
    const cv = document.createElement('canvas');
    cv.width = 80; cv.height = 90; cv.className = 'portrait-canvas';
    container.appendChild(cv);
    renderPortrait(cv, member);
  }
}

function renderSceneElement(containerId, congressNum) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const img = document.createElement('img');
  img.className = 'scene-img';
  img.src = `images/scenes/congress-${congressNum}.png`;
  img.onerror = function() {
    container.innerHTML = '';
    const cv = document.createElement('canvas');
    cv.width = 700; cv.height = 180; cv.className = 'scene-canvas';
    container.appendChild(cv);
    renderCongressScene(cv, congressNum);
  };
  container.appendChild(img);
}

// ============================================================
// HELPER FUNCTIONS
// ============================================================
function getMemberStatus(member, decimalYear) {
  for (const stint of member.s) {
    if (decimalYear >= stint.a && decimalYear <= stint.b) {
      return stint.t === 'f' ? 'Full Member' : 'Candidate Member';
    }
  }
  return null;
}

function getMembersAtCongress(congress) {
  return pbMembers.filter(m => getMemberStatus(m, congress.decimal) !== null);
}

// ============================================================
// FACTION TRACK HELPERS
// ============================================================
function applyFactionShift(choice) {
  // Infer faction shifts from choice stat effects
  // Left/Right economic axis: loyalty moves you right (conformist), reputation moves left (principled)
  const econShift = (choice.loyalty * 0.3) - (choice.reputation * 0.2);
  // Hawk/Dove policy axis: loyalty moves hawk, cunning stays neutral, reputation moves dove
  const policyShift = (choice.loyalty * 0.2) - (choice.reputation * 0.15) + (choice.cunning * 0.05);
  gameState.factionEcon = clamp(Math.round(gameState.factionEcon + econShift), 0, 100);
  gameState.factionPolicy = clamp(Math.round(gameState.factionPolicy + policyShift), 0, 100);
}

function getFactionLabel(value, leftLabel, rightLabel) {
  if (value < 25) return leftLabel;
  if (value < 40) return 'Lean ' + leftLabel;
  if (value <= 60) return 'Centrist';
  if (value <= 75) return 'Lean ' + rightLabel;
  return rightLabel;
}

// ============================================================
// ALLIANCE SYSTEM
// ============================================================
function initAlliances(congress) {
  const colleagues = getMembersAtCongress(congress)
    .filter(m => m.n !== gameState.character.n)
    .slice(0, 12);
  gameState.alliances = {};
  colleagues.forEach(c => {
    gameState.alliances[c.n] = {
      relation: 'neutral',
      strength: 0,
      since: congress.year,
      fate: c.fate,
      died: c.died
    };
  });
}

function updateAlliancesForCongress(congress) {
  const currentMembers = getMembersAtCongress(congress).map(m => m.n);
  // Remove members no longer present
  for (const name of Object.keys(gameState.alliances)) {
    if (!currentMembers.includes(name) && name !== gameState.character.n) {
      delete gameState.alliances[name];
    }
  }
  // Add new members
  const colleagues = getMembersAtCongress(congress).filter(m => m.n !== gameState.character.n);
  colleagues.slice(0, 12).forEach(c => {
    if (!gameState.alliances[c.n]) {
      gameState.alliances[c.n] = {
        relation: 'neutral',
        strength: 0,
        since: congress.year,
        fate: c.fate,
        died: c.died
      };
    }
  });
  // Alliance decay
  for (const [name, rel] of Object.entries(gameState.alliances)) {
    if (rel.relation === 'ally') {
      rel.strength = Math.max(0, rel.strength - 10);
      if (rel.strength <= 0) rel.relation = 'neutral';
    }
    if (rel.relation === 'rival') {
      rel.strength = Math.max(0, rel.strength - 5);
      if (rel.strength <= 0) rel.relation = 'neutral';
    }
  }
  // Check if allies were purged/died — creates danger
  for (const [name, rel] of Object.entries(gameState.alliances)) {
    if (rel.relation === 'ally' && rel.died && congress.year >= rel.died) {
      gameState.log.push({text: `Your ally ${name} has been purged! Association with the condemned is dangerous.`, important: true});
      rel.relation = 'rival'; // now a liability
      rel.strength = 60;
    }
  }
}

function getAllianceSurvivalMod() {
  let mod = 0;
  for (const [name, rel] of Object.entries(gameState.alliances)) {
    if (rel.relation === 'ally') mod += rel.strength * 0.001;
    if (rel.relation === 'rival') mod -= rel.strength * 0.0005;
  }
  return clamp(mod, -0.15, 0.1);
}

function getAllianceHint(member, congress) {
  if (!member) return '';
  const yearsLeft = member.died ? member.died - congress.year : 99;
  const fate = member.fate;
  const nat = member.nat;

  // Power/safety hints
  const hints = [];
  if (member.n === congress.leader) {
    hints.push('Currently leads the party \u2014 powerful but risky if they fall');
  }
  if (fate === 'E' && yearsLeft <= 5 && yearsLeft > 0) {
    hints.push('Rumored to be falling from favor');
  } else if (fate === 'E' && yearsLeft <= 10) {
    hints.push('May face political difficulties ahead');
  } else if (fate === 'N' && yearsLeft > 15) {
    hints.push('A long-term survivor \u2014 safe bet');
  }

  // Nationality angle
  if (nat === member.nat && nat !== 'Russian') {
    hints.push(`Fellow ${nat} \u2014 shared national bond`);
  }

  // Status based hints
  const status = getMemberStatus(member, congress.decimal);
  if (status === 'Full Member') {
    hints.push('Full Politburo member \u2014 strong influence');
  } else if (status === 'Candidate Member') {
    hints.push('Candidate member \u2014 rising star');
  }

  // Era-specific strategic hints
  if (congress.year < 1930 && fate !== 'E') hints.push('Likely to survive the coming purges');
  if (congress.year >= 1934 && congress.year < 1940 && fate === 'E') hints.push('\u26A0 Dangerous associate in this era');
  if (congress.year >= 1950 && yearsLeft > 20) hints.push('Well-positioned for the post-Stalin era');

  return hints.length > 0 ? hints[Math.floor(Math.random() * hints.length)] : `${nat}, born ${member.born}`;
}

function formAlliance(name) {
  const allyCount = Object.values(gameState.alliances).filter(r => r.relation === 'ally').length;
  if (allyCount >= gameState.allianceSlots) {
    gameState.log.push({text: `You cannot maintain more than ${gameState.allianceSlots} alliances. Betray an existing ally first.`, important: false});
    return;
  }
  if (gameState.alliances[name]) {
    gameState.alliances[name].relation = 'ally';
    gameState.alliances[name].strength = 60;
    gameState.log.push({text: `You have formed a political alliance with ${name}.`, important: false});
    gameState.cunning = clamp(gameState.cunning + 2, 0, 100);
    gameState.alliancesFormed++;
  }
  render();
}

function betrayAlly(name) {
  if (gameState.alliances[name]) {
    const wasAlly = gameState.alliances[name].relation === 'ally';
    gameState.alliances[name].relation = 'rival';
    gameState.alliances[name].strength = 80;
    if (wasAlly) {
      gameState.log.push({text: `You have betrayed ${name}. They will remember this.`, important: true});
      gameState.loyalty = clamp(gameState.loyalty + 5, 0, 100);
      gameState.reputation = clamp(gameState.reputation - 8, 0, 100);
      gameState.cunning = clamp(gameState.cunning + 3, 0, 100);
      gameState.betrayalCount++;
    }
  }
  render();
}

      'Stagnation': ['STEADY PROGRESS ON ALL ECONOMIC FRONTS', 'PARTY ENSURES STABILITY'],
      'Late Brezhnev': ['INTERNATIONALIST DUTY FULFILLED', 'SOCIALIST ACHIEVEMENTS DEFENDED'],
      'Perestroika': ['RESTRUCTURING OPENS NEW ERA', 'GLASNOST REVEALS PATH TO RENEWAL'],
      'Collapse': ['PARTY SEEKS NEW FORMS OF UNITY', 'REFORM ENTERS DECISIVE PHASE']
    };
    const hl = eraHeadlines[era] || ['PARTY CONGRESS CONCLUDES SUCCESSFULLY'];
    mainHeadline = hl[Math.floor(Math.random() * hl.length)];
  }

  // ===== SUBHEADLINE: Reflect the player's specific choice =====
  let subhead = '';
  if (choice && choice.response) {
    // Extract the key consequence from the choice response (first sentence)
    const firstSentence = choice.response.split(/\.\s/)[0];
    // Rewrite in Pravda-speak
    if (choice.loyalty >= 8) {
      subhead = `Comrade ${char.n} demonstrates exemplary devotion to Party principles at Congress`;
    } else if (choice.loyalty <= -10) {
      subhead = `Certain delegates express views requiring further ideological study`;
    } else if (choice.reputation >= 8) {
      subhead = `Comrade ${char.n}'s bold position wins widespread support among delegates`;
    } else if (choice.cunning >= 10) {
      subhead = `Comrade ${char.n}'s skilled maneuvering noted by Congress observers`;
    } else if (choice.survival < 0.6) {
      subhead = `Tensions mark Congress proceedings as sharp debates divide delegates`;
    } else if (choice.reputation <= -8) {
      subhead = `Congress delegates reaffirm commitment to collective discipline`;
    } else {
      subhead = `The ${congress.name} concludes with unanimous adoption of all resolutions`;
    }
  } else {
    subhead = `Delegates affirm commitment to the Party's general line`;
  }

  // ===== BODY: Mix era flavor with choice-specific content =====
  const bodySnippets = [];
  bodySnippets.push(`The ${congress.name} of the Communist Party concluded its work in ${month} ${year} amid scenes of great enthusiasm.`);

  // Add a choice-reflective body paragraph
  if (choice && choice.response) {
    // Sanitize and Pravda-ify the response
    const resp = choice.response;
    if (choice.loyalty > 5) {
      bodySnippets.push(`In a display of party unity, delegates praised the constructive contributions of leading comrades to the Congress's work.`);
    } else if (choice.loyalty < -5) {
      bodySnippets.push(`The Congress noted that certain deviations from the correct line require vigilant attention from all Party organs.`);
    }
    if (choice.cunning > 5) {
      bodySnippets.push(`Political observers noted the sophisticated maneuvering of several delegates who demonstrated mastery of the Congress's complex proceedings.`);
    }
    if (choice.reputation > 5) {
      bodySnippets.push(`Several delegates received sustained applause for their contributions to the Congress's deliberations on questions of Party and state.`);
    }
  }

  // Era-specific filler
  if (year < 1930) {
    bodySnippets.push(`Production figures for the current period show ${Math.floor(Math.random()*15)+95}% fulfillment of planned targets in key industrial sectors.`);
  } else if (year < 1953) {
    bodySnippets.push(`The Congress unanimously affirmed the correctness of the Party's general line under the wise leadership of Comrade ${congress.leader}.`);
  } else if (year < 1985) {
    bodySnippets.push(`Delegates from all ${15} Union Republics expressed full support for the Central Committee's domestic and foreign policy course.`);
  } else {
    bodySnippets.push(`The Congress addressed the urgent tasks of restructuring and renewal facing Soviet society in the current historical moment.`);
  }

  // Alliance news
  const allies = Object.entries(gameState.alliances).filter(([,r]) => r.relation === 'ally');
  if (allies.length > 0) {
    const allyName = allies[Math.floor(Math.random() * allies.length)][0];
    bodySnippets.push(`Comrade ${char.n} was observed in close consultation with Comrade ${allyName} during Congress intermissions.`);
  }

  // Sidebar stats
  const sidebar = `Loyalty: ${gameState.loyalty} | Cunning: ${gameState.cunning} | Reputation: ${gameState.reputation} | Congresses survived: ${gameState.congressIndex + 1}`;

  return { mainHeadline, subhead, month, year, bodySnippets, sidebar };
}

function triggerDossier() {
  const congress = congresses[gameState.congressIndex];
  const era = congress.era;
  const events = (typeof dossierEvents !== 'undefined' && dossierEvents[era]) ? dossierEvents[era] : null;
  if (!events || events.length === 0) {
    proceedToNextCongress();
    return;
  }
  const event = events[Math.floor(Math.random() * events.length)];
  gameState.currentDossier = event;

  const card = document.getElementById('dossier-card');
  const typeLabels = {
    'nkvd_report': '☭ NKVD CLASSIFIED REPORT',
    'denunciation': '⚠ ANONYMOUS DENUNCIATION',
    'private_letter': '✉ PRIVATE CORRESPONDENCE',
    'intercepted_telegram': '⚡ INTERCEPTED TELEGRAM',
    'secret_memo': '🔒 SECRET MEMORANDUM',
    'confession': '📋 PRISONER CONFESSION',
    'intelligence_report': '🕵 INTELLIGENCE REPORT',
    'kgb_report': '☭ KGB CLASSIFIED REPORT'
  };

  card.innerHTML = `
    <div class="dossier-type">${typeLabels[event.type] || '📄 CLASSIFIED DOCUMENT'}</div>
    <h2>${event.title}</h2>
    <div class="dossier-text"><p>${event.text}</p></div>
    <div id="choices">
      ${event.choices.map((c, i) => `
        <button class="choice-btn" onclick="makeDossierChoice(${i})">
          <span class="choice-label">${String.fromCharCode(65 + i)}.</span> ${c.text}
        </button>
      `).join('')}
    </div>
    <div class="dossier-stamp">СЕКРЕТНО · FOR AUTHORIZED EYES ONLY</div>
  `;
  document.getElementById('dossier-overlay').classList.add('active');
}

function makeDossierChoice(index) {
  const event = gameState.currentDossier;
  const choice = event.choices[index];

  gameState.loyalty = clamp(gameState.loyalty + choice.loyalty, 0, 100);
  gameState.cunning = clamp(gameState.cunning + choice.cunning, 0, 100);
  gameState.reputation = clamp(gameState.reputation + choice.reputation, 0, 100);
  applyFactionShift(choice);

  gameState.log.push({text: `Secret dossier: ${choice.response}`, important: choice.survival < 0.7});

  // Survival check for dossier
  let survivalChance = choice.survival + (gameState.cunning - 50) * 0.003;
  survivalChance = clamp(survivalChance, 0.1, 0.98);
  const roll = Math.random();
  if (roll > survivalChance) {
    const congress = congresses[gameState.congressIndex];
    gameState.alive = false;
    gameState.phase = 'gameover';
    gameState.deathText = `Between Congresses, a secret document sealed your fate. ${choice.response} The security organs acted swiftly.`;
    document.getElementById('dossier-overlay').classList.remove('active');
    render();
    return;
  }

  document.getElementById('dossier-overlay').classList.remove('active');
  gameState.dossiersSurvived++;
  proceedToNextCongress();
}

function proceedToNextCongress() {
  // Store current members for tracker delta on next congress
  const currentCongress = congresses[gameState.congressIndex];
  gameState.previousMembers = getMembersAtCongress(currentCongress).map(m => m.n);

  gameState.congressIndex++;

  if (gameState.congressIndex >= congresses.length) {
    gameState.phase = 'gameover';
    render();
    return;
  }

  const nextCongress = congresses[gameState.congressIndex];

  // Clear scenario lock so next congress picks a fresh scenario
  gameState.currentScenario = null;
  gameState.scenarioCongressNum = null;

  // Natural stat drift — all stats decay slightly between congresses
  const loyaltyDrift = gameState.loyalty > 60 ? -Math.floor(Math.random() * 5) : Math.floor(Math.random() * 3);
  const cunningDrift = gameState.cunning > 50 ? -Math.floor(Math.random() * 4) : Math.floor(Math.random() * 2) - 1;
  const repDrift = gameState.reputation > 50 ? -Math.floor(Math.random() * 4) : Math.floor(Math.random() * 2) - 1;
  gameState.loyalty = clamp(gameState.loyalty + loyaltyDrift, 0, 100);
  gameState.cunning = clamp(gameState.cunning + cunningDrift, 0, 100);
  gameState.reputation = clamp(gameState.reputation + repDrift, 0, 100);

  // Update alliances
  updateAlliancesForCongress(nextCongress);

  gameState.crisisThisCongress = false;
  render();
}

function getEligibleStartCharacters() {
  // Exclude characters who are scenario subjects (leaders, faction heads)
  // Playing as them creates confusing scenarios that describe your own actions
  const excludedNames = new Set([
    'Lenin',       // Leader of early congresses, subject of succession scenarios
    'Stalin',      // Leader from 12th Congress onward, central to most scenarios
    'Trotskii',    // Major faction leader, subject of opposition scenarios
    'Zinovev',     // Opposition leader, subject of faction struggle scenarios
    'Kamenev',     // Opposition leader alongside Zinoviev
    'Bukharin',    // Right Opposition leader, subject of NEP/collectivization scenarios
    'Khrushchev',  // Leader from 20th Congress, subject of Thaw scenarios
    'Brezhnev',    // Leader from 23rd Congress, subject of stagnation scenarios
    'Gorbachev',   // Leader from 27th Congress, subject of perestroika scenarios
    'Andropov',    // KGB chief/leader, featured prominently in succession scenarios
    'Kirov',       // Subject of 17th Congress assassination scenarios
  ]);
  // Characters who were on the Politburo at any of the first 10 congresses
  return pbMembers.filter(m => {
    if (excludedNames.has(m.n)) return false;
    for (const c of congresses.slice(0, 10)) {
      if (getMemberStatus(m, c.decimal)) return true;
    }
    return false;
  });
}

function getRandomCharacters(count) {
  const eligible = getEligibleStartCharacters();
  const shuffled = [...eligible].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, Math.min(count, eligible.length));
}

function fateDescription(member) {
  switch (member.fate) {
    case 'E': return `Executed ${member.died}`;
    case 'A': return `Assassinated ${member.died}`;
    case 'S': return `Suicide ${member.died}`;
    case 'N': return member.died ? `Died ${member.died}` : 'Survived';
  }
}

function fateClass(member) {
  switch (member.fate) {
    case 'E': return 'fate-executed';
    case 'A': return 'fate-assassinated';
    case 'S': return 'fate-suicide';
    case 'N': return 'fate-survived';
  }
}

function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }

function findFirstCongress(member) {
  for (let i = 0; i < congresses.length; i++) {
    if (getMemberStatus(member, congresses[i].decimal)) return i;
  }
  return 0;
}
