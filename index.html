  const congress = congresses[gameState.congressIndex];
  const isIronCurtain = gameState.mode === 'iron_curtain';

  // Only pick scenario once per congress — re-renders (e.g. from alliance clicks) keep the same scenario
  if (!gameState.currentScenario || gameState.scenarioCongressNum !== congress.num) {
    const crisisChance = 0.10;
    let isCrisis = false;
    let crisisEvent = null;
    if (!gameState.crisisThisCongress && Math.random() < crisisChance && typeof crisisEvents !== 'undefined') {
      const events = crisisEvents[congress.era];
      if (events && events.length > 0) {
        crisisEvent = events[Math.floor(Math.random() * events.length)];
        isCrisis = true;
        gameState.crisisThisCongress = true;
      }
    }

    let currentScenario = null;
    if (isCrisis) {
      currentScenario = crisisEvent;
    } else {
      const allScenarios = [];
      if (scenarios[congress.num]) allScenarios.push(scenarios[congress.num][0]);
      if (scenarios2[congress.num]) allScenarios.push(scenarios2[congress.num]);
      if (typeof scenarios3 !== 'undefined' && scenarios3[congress.num]) allScenarios.push(...scenarios3[congress.num]);
      if (typeof scenarios3b !== 'undefined' && scenarios3b[congress.num]) allScenarios.push(...scenarios3b[congress.num]);
      currentScenario = allScenarios.length > 0 ? allScenarios[Math.floor(Math.random() * allScenarios.length)] : null;
    }
    gameState.currentScenario = currentScenario;
    gameState.currentIsCrisis = isCrisis;
    gameState.scenarioCongressNum = congress.num;
  }
  const memberStatus = getMemberStatus(gameState.character, congress.decimal);

  // Congress progress pips
  let pips = congresses.map((c, i) => {
    let cls = 'congress-pip';
    if (i < gameState.congressIndex) cls += ' completed';
    else if (i === gameState.congressIndex) cls += ' current';
    return `<div class="${cls}" title="${c.name} (${c.year})"></div>`;
  }).join('');

  // Status bar (hidden in Iron Curtain mode)
  let statusHtml = '';
  if (!isIronCurtain) {
    // Orthodoxy color: green (low/safe) → yellow (moderate) → red (high/dangerous in reform eras)
    const orthoVal = Math.round(gameState.orthodoxy);
    const isReformNow = ['Thaw','Khrushchev','Perestroika','Collapse'].includes(congress.era);
    const orthoColor = orthoVal < 25 ? '#44aa44' : orthoVal < 50 ? '#aaaa44' : orthoVal < 75 ? '#cc8833' : '#cc3333';
    const orthoWarning = isReformNow && orthoVal > 50 ? ' ⚠' : '';
    const orthoTooltip = isReformNow
      ? 'Orthodox Reputation — your accumulated ideological commitments now endanger you as reforms advance'
      : 'Orthodox Reputation — tracks your record of ideological commitment. Helps under authoritarian rule, hurts during reforms.';

    // Compute effect annotations for each stat
    const _authEras = ['Stalin consolidating','Collectivization','Pre-Terror','Post-Terror','Late Stalin'];
    const _reformEras = ['Thaw','Perestroika','Collapse'];
    const _terrorEras = ['Pre-Terror','Post-Terror'];
    const _isAuth = _authEras.includes(congress.era);
    const _isReform = _reformEras.includes(congress.era);
    const _isTerror = _terrorEras.includes(congress.era);

    // Loyalty effects
    const loyaltyEffects = [];
    if (_isAuth) {
      if (gameState.loyalty < 20) loyaltyEffects.push({text: '−35% survival', color: '#ff4444'});
      else if (gameState.loyalty < 40) loyaltyEffects.push({text: '−25% survival', color: '#ff6644'});
      if (_isTerror && gameState.loyalty < 60) loyaltyEffects.push({text: 'Terror penalty', color: '#ff4444'});
      if (gameState.loyalty > 50) loyaltyEffects.push({text: '+survival', color: '#44cc44'});
    } else if (_isReform) {
      if (gameState.loyalty > 80) loyaltyEffects.push({text: 'Too rigid', color: '#ff6644'});
    }
    if (gameState.loyalty > 75) loyaltyEffects.push({text: '−1 Cunning/turn', color: '#ccaa44'});
    if (loyaltyEffects.length === 0) loyaltyEffects.push({text: 'No active effect', color: '#6a5a3a'});

    // Cunning effects
    const cunningEffects = [];
    const cunningMod = ((gameState.cunning - 50) * 0.004 * 100).toFixed(1);
    if (gameState.cunning > 50) cunningEffects.push({text: `+${cunningMod}% survival`, color: '#44cc44'});
    else if (gameState.cunning < 50) cunningEffects.push({text: `${cunningMod}% survival`, color: '#ff6644'});
    if (gameState.cunning > 75) cunningEffects.push({text: '−2 Loy & Rep/turn', color: '#ccaa44'});
    if (cunningEffects.length === 0) cunningEffects.push({text: 'No active effect', color: '#6a5a3a'});

    // Reputation effects
    const repEffects = [];
    if (gameState.reputation > 75) repEffects.push({text: '−1 Cunning/turn', color: '#ccaa44'});
    if (gameState.reputation > 0) repEffects.push({text: '−Orthodoxy/turn', color: '#44cc44'});
    if (repEffects.length === 0) repEffects.push({text: 'No active effect', color: '#6a5a3a'});

    // Orthodoxy effects
    const orthoEffects = [];
    if (_isAuth) {
      const orthoBonus = (orthoVal * 0.003 * 100).toFixed(1);
      if (orthoVal > 0) orthoEffects.push({text: `+${orthoBonus}% survival`, color: '#44cc44'});
      orthoEffects.push({text: 'Accumulating', color: '#ccaa44'});
    } else if (isReformNow) {
      const orthoPenMap = {'Thaw': 0.003, 'Khrushchev': 0.002, 'Perestroika': 0.004, 'Collapse': 0.005};
      const penRate = orthoPenMap[congress.era] || 0.001;
      const orthoPen = (orthoVal * penRate * 100).toFixed(1);
      if (orthoVal > 0) orthoEffects.push({text: `−${orthoPen}% survival`, color: '#ff6644'});
      orthoEffects.push({text: 'Decaying', color: '#44cc44'});
    } else {
      const brezPen = (orthoVal * 0.001 * 100).toFixed(1);
      if (orthoVal > 0) orthoEffects.push({text: `−${brezPen}% survival`, color: '#ccaa44'});
      orthoEffects.push({text: 'Decaying slowly', color: '#6a5a3a'});
    }
    if (orthoEffects.length === 0) orthoEffects.push({text: 'No active effect', color: '#6a5a3a'});

    function renderEffects(effects) {
      return effects.map(e => `<span style="color:${e.color}">${e.text}</span>`).join(' · ');
    }

    statusHtml = `
      <div id="status-bar">
        <div class="stat-box" title="Loyalty to party leadership">
          <div class="stat-label">Loyalty</div>
          <div class="stat-value">${gameState.loyalty}</div>
          <div class="stat-bar"><div class="stat-bar-fill loyalty-fill" style="width:${gameState.loyalty}%"></div></div>
          <div class="stat-effect">${renderEffects(loyaltyEffects)}</div>
        </div>
        <div class="stat-box" title="Political cunning and survival instinct">
          <div class="stat-label">Cunning</div>
          <div class="stat-value">${gameState.cunning}</div>
          <div class="stat-bar"><div class="stat-bar-fill cunning-fill" style="width:${gameState.cunning}%"></div></div>
          <div class="stat-effect">${renderEffects(cunningEffects)}</div>
        </div>
        <div class="stat-box" title="Standing among peers">
          <div class="stat-label">Reputation</div>
          <div class="stat-value">${gameState.reputation}</div>
          <div class="stat-bar"><div class="stat-bar-fill reputation-fill" style="width:${gameState.reputation}%"></div></div>
          <div class="stat-effect">${renderEffects(repEffects)}</div>
        </div>
        <div class="stat-box" title="${orthoTooltip}">
          <div class="stat-label">Orthodoxy${orthoWarning}</div>
          <div class="stat-value" style="color:${orthoColor}">${orthoVal}</div>
          <div class="stat-bar"><div class="stat-bar-fill" style="width:${orthoVal}%;background:${orthoColor}"></div></div>
          <div class="stat-effect">${renderEffects(orthoEffects)}</div>
        </div>
      </div>
    `;
  }

  // Faction tracks (hidden in Iron Curtain)
  let factionHtml = '';
  if (!isIronCurtain) {
    const econLabel = getFactionLabel(gameState.factionEcon, 'Leftist', 'Rightist');
    const policyLabel = getFactionLabel(gameState.factionPolicy, 'Dove', 'Hawk');

    // Calculate and display current faction effects
    const isAuth = ['Stalin consolidating','Collectivization','Pre-Terror','Post-Terror','Late Stalin'].includes(congress.era);
    const isReform = ['Thaw','Perestroika','Collapse'].includes(congress.era);

    const isBrezh = ['Brezhnev','Stagnation','Late Brezhnev'].includes(congress.era);

    let econEffect = '';
    if (isAuth && gameState.factionEcon < 25) {
      econEffect = '<span style="color:#ff4444;">⚠ Too leftist for this era: −5% survival</span>';
    } else if (isAuth && gameState.factionEcon > 60) {
      econEffect = '<span style="color:#44ff44;">Aligned with leadership: safe position</span>';
    } else if (isReform && gameState.factionEcon < 25) {
      econEffect = '<span style="color:#ff4444;">⚠ Too statist under reforms: −' + (isTransition ? '6' : '3') + '% survival</span>';
    } else if (isReform && gameState.factionEcon > 75) {
      econEffect = '<span style="color:#44ff44;">Market-friendly stance helps under reforms</span>';
    } else if (isBrezh && gameState.factionEcon > 75) {
      econEffect = '<span style="color:#ffcc44;">Too market-oriented for Brezhnev era: −3% survival</span>';
    } else {
      econEffect = '<span style="color:#6a5a3a;">No strong effect this era</span>';
    }

    const isTransition = ['Thaw','Perestroika'].includes(congress.era);
    let policyEffect = '';
    if (isAuth && gameState.factionPolicy < 25) {
      policyEffect = '<span style="color:#ff4444;">⚠ Too dovish for this era: −3% survival</span>';
    } else if (isAuth && gameState.factionPolicy > 80) {
      policyEffect = '<span style="color:#ffcc44;">Overcommitted hawk: −2% survival</span>';
    } else if (isAuth && gameState.factionPolicy > 60) {
      policyEffect = '<span style="color:#44ff44;">Hardline stance valued under authoritarian rule</span>';
    } else if (isReform && gameState.factionPolicy > 80) {
      policyEffect = '<span style="color:#ff4444;">⚠ Too hawkish for reform era: −' + (isTransition ? '10' : '5') + '% survival</span>';
    } else if (isReform && gameState.factionPolicy < 40) {
      policyEffect = '<span style="color:#44ff44;">Reform-minded stance is an asset now</span>';
    } else {
      policyEffect = '<span style="color:#6a5a3a;">No strong effect this era</span>';
    }

    factionHtml = `
      <div class="faction-tracks">
        <div class="faction-track">
          <div class="faction-track-label"><span>Left</span><span>${econLabel}</span><span>Right</span></div>
          <div class="faction-track-bar"><div class="faction-track-marker" style="left:${gameState.factionEcon}%"></div></div>
          <div style="font-size:0.7em;margin-top:4px;">${econEffect}</div>
        </div>
        <div class="faction-track">
          <div class="faction-track-label"><span>Dove</span><span>${policyLabel}</span><span>Hawk</span></div>
          <div class="faction-track-bar"><div class="faction-track-marker" style="left:${gameState.factionPolicy}%"></div></div>
          <div style="font-size:0.7em;margin-top:4px;">${policyEffect}</div>
        </div>
      </div>
    `;
  }

  // Character card
  let charCard = `
    <div id="character-card">
      <div id="portrait-game" class="portrait-wrapper"></div>
      <h3>${gameState.character.n}</h3>
      <div class="char-detail">${gameState.character.nat} &bull; Age ${congress.year - gameState.character.born}</div>
      <div class="char-detail">Status: <span style="color:${memberStatus === 'Full Member' ? '#66ff66' : memberStatus === 'Candidate Member' ? '#ffcc44' : '#ff6666'}">${memberStatus || 'Not on Politburo'}</span> <span style="font-size:0.8em;color:${memberStatus === 'Full Member' ? '#44cc44' : '#ff6644'}">${memberStatus === 'Full Member' ? '(+5% survival, +2 Rep/turn)' : memberStatus === 'Candidate Member' ? '(−3% survival)' : '(−12% survival, exposed)'}</span></div>
      ${!isIronCurtain ? `<div class="char-detail">Historical fate: <span class="${fateClass(gameState.character)}">${fateDescription(gameState.character)}</span></div>` : ''}
    </div>
  `;

  // Alliances panel
  let allianceHtml = '';
  const allianceEntries = Object.entries(gameState.alliances);
  if (allianceEntries.length > 0) {
    const allyCount = allianceEntries.filter(([,r]) => r.relation === 'ally').length;
    const chips = allianceEntries.slice(0, 10).map(([name, rel]) => {
      return `<span class="alliance-chip ${rel.relation}" title="${rel.relation} (strength: ${rel.strength})">${name}</span>`;
    }).join('');

    // Alliance actions — form/betray
    const neutralNames = allianceEntries.filter(([,r]) => r.relation === 'neutral').map(([n]) => n);
    const allyNames = allianceEntries.filter(([,r]) => r.relation === 'ally').map(([n]) => n);
    let allianceActions = '';
    if (neutralNames.length > 0 && allyCount < gameState.allianceSlots) {
      const formBtns = neutralNames.slice(0, 4).map(n => {
        const member = pbMembers.find(m => m.n === n);
        const hint = getAllianceHint(member, congress);
        return `<button class="alliance-btn" onclick="formAlliance('${n}')" title="${hint}"><strong>${n}</strong><br><span style="font-size:0.75em;color:#8a7a5a;">${hint}</span></button>`;
      }).join('');
      allianceActions += `<div class="alliance-actions"><h4>Form Alliance With:</h4>${formBtns}</div>`;
    }
    if (allyNames.length > 0) {
      const betrayBtns = allyNames.map(n => `<button class="alliance-btn betray" onclick="betrayAlly('${n}')">Betray ${n}</button>`).join('');
      allianceActions += `<div class="alliance-actions"><h4>Betray an Ally:</h4>${betrayBtns}</div>`;
    }

    allianceHtml = `
      <div class="alliances-panel">
        <h4>Political Relations (${allyCount}/${gameState.allianceSlots} alliances)</h4>
        <div class="alliance-list">${chips}</div>
        ${allianceActions}
      </div>
    `;
  }

  // ===== POLITBURO TRACKER =====
  const allCurrentMembers = getMembersAtCongress(congress);
  const currentMemberNames = allCurrentMembers.map(m => m.n);
  const prevNames = gameState.previousMembers || [];
  const newNames = currentMemberNames.filter(n => !prevNames.includes(n));
  const purgedNames = prevNames.filter(n => !currentMemberNames.includes(n));

  let trackerHtml = '';
  if (gameState.congressIndex > 0 || prevNames.length > 0) {
    // Build list: current members + purged members from last congress
    const trackerEntries = [];
    // Current members
    allCurrentMembers.forEach(m => {
      trackerEntries.push({
        name: m.n,
        status: newNames.includes(m.n) ? 'new' : 'continuing',
        isPlayer: m.n === gameState.character.n,
        member: m
      });
    });
    // Purged members (from previous congress, no longer present)
    purgedNames.forEach(pn => {
      const pm = pbMembers.find(m => m.n === pn);
      if (pm) {
        trackerEntries.push({ name: pn, status: 'purged', isPlayer: false, member: pm });
      }
    });

    const trackerCards = trackerEntries.map(e => {
      const key = getPortraitKey(e.member);
      const hasImg = portraitImages.has(key);
      const cls = e.status === 'purged' ? 'purged' : (e.status === 'new' ? 'new-member' : '');
      const playerCls = e.isPlayer ? ' is-player' : '';
      const imgHtml = hasImg
        ? `<img class="tracker-portrait" src="images/portraits/${key}.png" onerror="this.style.background='#3a2a1a'">`
        : `<div class="tracker-portrait" style="display:flex;align-items:center;justify-content:center;font-size:0.6em;color:#6a5a3a;">${e.name.charAt(0)}</div>`;
      return `<div class="tracker-member ${cls}${playerCls}" title="${e.name}${e.status === 'purged' ? ' (removed)' : e.status === 'new' ? ' (new)' : ''}">
        ${imgHtml}
        <div class="tracker-name">${e.name}</div>
      </div>`;
    }).join('');

    const purgeNote = purgedNames.length > 0
      ? `<div style="font-size:0.75em;color:#ff6666;margin-top:6px;">Removed since last Congress: ${purgedNames.join(', ')}</div>`
      : '';
    const newNote = newNames.length > 0
      ? `<div style="font-size:0.75em;color:#44ff44;margin-top:4px;">New members: ${newNames.join(', ')}</div>`
      : '';

    trackerHtml = `
      <div class="politburo-tracker">
        <h4>☭ Politburo Composition (${allCurrentMembers.length} members)</h4>
        <div class="tracker-grid">${trackerCards}</div>
        <div class="tracker-legend">
          <span class="legend-player">You</span>
          <span class="legend-new">New</span>
          <span class="legend-purged">Removed</span>
          <span class="legend-continuing">Continuing</span>
        </div>
        ${purgeNote}${newNote}
      </div>
    `;
  }


  let narrativeHtml = '';
  let choicesHtml = '';

  const currentScenario = gameState.currentScenario;
  const isCrisis = gameState.currentIsCrisis;

  if (currentScenario) {
    narrativeHtml = `
      <p>${currentScenario.text}</p>
    `;
    const choices = currentScenario.choices || [];
    // Get continuity bonus choices
    let bonusChoices = [];
    if (typeof getContinuityBonuses === 'function' && gameState.continuityTags.length > 0) {
      bonusChoices = getContinuityBonuses(congress.num, gameState.continuityTags);
    }
    // Store bonus choices on scenario so makeChoice can access them
    currentScenario._bonusChoices = bonusChoices;
    const totalChoices = choices.length;
    choicesHtml = choices.map((choice, i) => `
      <button class="choice-btn" onclick="makeChoice(${i})" id="choice-btn-${i}">
        <span class="choice-label">${String.fromCharCode(65 + i)}.</span> ${choice.text}
      </button>
    `).join('');
    // Add bonus choices from continuity system
    bonusChoices.forEach((bc, bi) => {
      const idx = totalChoices + bi;
      choicesHtml += `
        <button class="choice-btn bonus-choice" onclick="makeChoice(${idx})" id="choice-btn-${idx}">
          <span class="choice-label" style="color:#ffd700;">★</span> ${bc.text}
          <span class="choice-origin">↳ Unlocked by: ${bc.origin}</span>
        </button>
      `;
    });
  } else {
    narrativeHtml = `<p>${congress.desc}</p><p>The Congress proceeds without major incident for you personally.</p>`;
    choicesHtml = `<button class="choice-btn" onclick="advanceCongress()"><span class="choice-label">&#9733;</span> Continue to the next Congress</button>`;
  }

  // Crisis banner
  let crisisBanner = '';
  if (isCrisis && currentScenario && currentScenario.title) {
    crisisBanner = `<div class="crisis-banner">⚠ ${currentScenario.title} ⚠</div>`;
  }

  // Speed run timer
  let timerHtml = '';
  if (gameState.mode === 'speed_run' && currentScenario) {
    timerHtml = `<div id="speed-timer" style="text-align:center;color:#ff4444;font-family:'Special Elite',cursive;font-size:1.3em;margin-bottom:10px;">Time: <span id="timer-value">${gameState.speedRunChoiceTime}</span>s</div>`;
  }

  area.innerHTML = `
    <div class="congress-progress">${pips}</div>
    <div class="congress-banner">
      ${congress.name}
      <span class="year">${congress.era} &bull; ${congress.year} &bull; Leader: ${congress.leader}</span>
    </div>
    <div id="scene-container"></div>
    ${crisisBanner}
    ${timerHtml}
    ${charCard}
    ${statusHtml}
    ${factionHtml}
    ${trackerHtml}
    <div id="narrative" class="typewriter">${narrativeHtml}</div>
    <div id="choices">${choicesHtml}</div>
    ${!isIronCurtain ? allianceHtml : ''}
    ${gameState.log.length > 0 ? `<div class="event-log">${gameState.log.slice(-8).map(l => `<p class="${l.important ? 'important' : ''}">${l.text}</p>`).join('')}</div>` : ''}
  `;

  // Render images after DOM update
  requestAnimationFrame(() => {
    renderSceneElement('scene-container', congress.num);
    renderPortraitElement('portrait-game', gameState.character);
  });

  // Start speed run timer
  if (gameState.mode === 'speed_run' && currentScenario) {
    startSpeedTimer(currentScenario.choices.length);
  }
}

// ============================================================
// SPEED RUN TIMER
// ============================================================
let speedTimerInterval = null;
function startSpeedTimer(numChoices) {
  if (speedTimerInterval) clearInterval(speedTimerInterval);
  let timeLeft = gameState.speedRunChoiceTime;
  const timerEl = document.getElementById('timer-value');
  speedTimerInterval = setInterval(() => {
    timeLeft--;
    if (timerEl) timerEl.textContent = timeLeft;
    if (timeLeft <= 5 && timerEl) timerEl.style.color = '#ff0000';
    if (timeLeft <= 0) {
      clearInterval(speedTimerInterval);
      speedTimerInterval = null;
      // Random choice — the Party decides for you
      const randomChoice = Math.floor(Math.random() * numChoices);
      gameState.log.push({text: `You hesitated! The Party made the decision for you.`, important: true});
      makeChoice(randomChoice);
    }
  }, 1000);
}

function renderGameOver(area) {
  const congress = congresses[gameState.congressIndex];
  const survived = gameState.congressIndex >= congresses.length - 1;

  // Stop speed timer if running
  if (speedTimerInterval) { clearInterval(speedTimerInterval); speedTimerInterval = null; }

  area.innerHTML = `
    <div class="congress-progress">${congresses.map((c, i) => {
      let cls = 'congress-pip';
      if (i < gameState.congressIndex) cls += ' completed';
      else if (i === gameState.congressIndex) cls += ' failed';
      return `<div class="${cls}"></div>`;
    }).join('')}</div>
  `;

  const overlay = document.getElementById('outcome-overlay');
  const card = document.getElementById('outcome-card');
  const title = document.getElementById('outcome-title');
  const text = document.getElementById('outcome-text');
  const hist = document.getElementById('outcome-historical');

  overlay.classList.add('active');

  const biography = generateBiography();

  if (survived) {
    card.className = 'outcome-card survived';
    title.textContent = 'YOU SURVIVED THE POLITBURO';
    text.innerHTML = biography;
    hist.innerHTML = '';
  } else {
    card.className = 'outcome-card purged';
    title.textContent = 'YOU HAVE BEEN PURGED';
    const deathIntro = gameState.deathText || `At the ${congress.name} (${congress.year}), your political career\u2014and perhaps your life\u2014came to an end.`;
    text.innerHTML = `<p>${deathIntro}</p>${biography}`;
    hist.innerHTML = '';
  }
}

// ============================================================
// GAME LOGIC
// ============================================================
function startGame() {
  gameState.phase = 'modeselect';
  render();
}

function selectCharacter(index) {
  const char = gameState.selectOptions[index];
  gameState.character = char;

  gameState.congressIndex = findFirstCongress(char);

  gameState.loyalty = 50;
  gameState.cunning = 50;
  gameState.reputation = 50;
  gameState.factionEcon = 50;
  gameState.factionPolicy = 50;
  gameState.alive = true;
  gameState.log = [];
  gameState.decisions = [];
  gameState.alliances = {};
  gameState.crisisThisCongress = false;
  gameState.phase = 'playing';

  if (gameState.mode === 'speed_run') {
    gameState.speedRunStart = Date.now();
  }

  // Initialize alliances and tracker
  const firstCongress = congresses[gameState.congressIndex];
  initAlliances(firstCongress);
  gameState.previousMembers = []; // No previous congress to compare

  gameState.log.push({text: `You are ${char.n}, ${char.nat}, born ${char.born}. Your journey through Soviet politics begins.`, important: true});
  if (gameState.mode === 'iron_curtain') {
    gameState.log.push({text: `Iron Curtain Mode: Stats are hidden. Trust your instincts.`, important: true});
  }
  if (gameState.mode === 'speed_run') {
    gameState.log.push({text: `Speed Run: ${gameState.speedRunChoiceTime} seconds per decision. Hesitate and the Party decides for you!`, important: true});
  }
  render();
}

function makeChoice(choiceIndex) {
  // Stop speed timer
  if (speedTimerInterval) { clearInterval(speedTimerInterval); speedTimerInterval = null; }

  const congress = congresses[gameState.congressIndex];
  const scenario = gameState.currentScenario;
  const normalChoices = scenario.choices || [];
  const bonusChoices = scenario._bonusChoices || [];
  const choice = choiceIndex < normalChoices.length
    ? normalChoices[choiceIndex]
    : bonusChoices[choiceIndex - normalChoices.length];

  // Apply stat changes with diminishing returns and opposing-stat tension
  // Diminishing returns: gains are halved above 70, quartered above 85
  function applyStatGain(current, delta) {
    if (delta > 0) {
      if (current >= 85) delta = Math.ceil(delta * 0.25);
      else if (current >= 70) delta = Math.ceil(delta * 0.5);
    }
    return delta;
  }
  const loyaltyDelta = applyStatGain(gameState.loyalty, choice.loyalty);
  const cunningDelta = applyStatGain(gameState.cunning, choice.cunning);
  const repDelta = applyStatGain(gameState.reputation, choice.reputation);

  gameState.loyalty = clamp(gameState.loyalty + loyaltyDelta, 0, 100);
  gameState.cunning = clamp(gameState.cunning + cunningDelta, 0, 100);
  gameState.reputation = clamp(gameState.reputation + repDelta, 0, 100);

  // Stat tension: high cunning erodes loyalty and reputation over time
  if (gameState.cunning > 75) {
    gameState.loyalty = clamp(gameState.loyalty - 2, 0, 100);
    gameState.reputation = clamp(gameState.reputation - 2, 0, 100);
  }
  // High loyalty reduces cunning (true believers aren't schemers)
  if (gameState.loyalty > 75) {
    gameState.cunning = clamp(gameState.cunning - 1, 0, 100);
  }
  // High reputation reduces cunning (public figures can't scheme as easily)
  if (gameState.reputation > 75) {
    gameState.cunning = clamp(gameState.cunning - 1, 0, 100);
  }

  // Apply faction shifts
  applyFactionShift(choice);

  // === ORTHODOXY ACCUMULATOR ===
  // Loyalty-boosting choices in authoritarian eras build "orthodoxy" — a hidden record
  // of ideological commitment that becomes dangerous when the political winds change.
  const orthoAuthEras = ['Stalin consolidating','Collectivization','Pre-Terror','Post-Terror','Late Stalin'];
  const orthoReformEras = ['Thaw','Khrushchev','Perestroika','Collapse'];
  if (orthoAuthEras.includes(congress.era)) {
    if (loyaltyDelta > 0) {
      gameState.orthodoxy = clamp(gameState.orthodoxy + loyaltyDelta * 0.5, 0, 100);
    }
    // Big loyalty commitments create political baggage records
    if (loyaltyDelta >= 8) {
      gameState.politicalBaggage.push({
        era: congress.era, year: congress.year,
        description: `Demonstrated fervent loyalty at the ${congress.name}`,
        severity: loyaltyDelta >= 12 ? 'high' : 'medium'
      });
    }
  }
  // Reputation gains (reform-minded, independent thinking) slowly erode orthodoxy
  if (repDelta > 0) {
    gameState.orthodoxy = clamp(gameState.orthodoxy - repDelta * 0.2, 0, 100);
  }
  // Orthodoxy decays slowly in non-authoritarian eras (people forget, records gather dust)
  if (!orthoAuthEras.includes(congress.era)) {
    gameState.orthodoxy = clamp(gameState.orthodoxy - 1, 0, 100);
  }

  // Track decision for biography
  gameState.decisions.push({
    congress: congress.name, year: congress.year, era: congress.era,
    choiceText: choice.text, response: choice.response,
    loyalty: gameState.loyalty, cunning: gameState.cunning, reputation: gameState.reputation,
    factionEcon: gameState.factionEcon, factionPolicy: gameState.factionPolicy,
    wasCrisis: gameState.currentIsCrisis
  });

  // Tag this choice for cross-scenario continuity
  if (typeof tagChoice === 'function') {
    const newTags = tagChoice(choice.text);
    newTags.forEach(t => {
      if (!gameState.continuityTags.includes(t)) {
        gameState.continuityTags.push(t);
        const trigger = continuityTriggers[t];
        if (trigger) {
          gameState.log.push({text: `Your decision has been noted: "${trigger.description}". This may open new options in future Congresses.`, important: false});
        }
      }
    });
  }

  // Track achievement stats
  gameState.maxLoyalty = Math.max(gameState.maxLoyalty, gameState.loyalty);
  gameState.maxCunning = Math.max(gameState.maxCunning, gameState.cunning);
  gameState.maxReputation = Math.max(gameState.maxReputation, gameState.reputation);
  gameState.minLoyalty = Math.min(gameState.minLoyalty, gameState.loyalty);
  if (choice.survival < 0.6) gameState.lowSurvivalChoices++;
  if (gameState.currentIsCrisis) gameState.crisesSurvived++;

  // Log the response
  gameState.log.push({text: `${congress.name}: ${choice.response}`, important: choice.survival < 0.7});

  // === ENHANCED SURVIVAL CHECK ===
  let survivalChance = choice.survival;

  // Crisis events have higher stakes
  if (gameState.currentIsCrisis) {
    gameState.log.push({text: `Crisis event! The stakes are higher than usual.`, important: true});
  }

  // POLITBURO STATUS
  const memberStatus = getMemberStatus(gameState.character, congress.decimal);
  if (memberStatus === 'Full Member') {
    survivalChance += 0.05;
    gameState.reputation = clamp(gameState.reputation + 2, 0, 100);
  } else if (memberStatus === 'Candidate Member') {
    survivalChance -= 0.03;
  } else {
    survivalChance -= 0.12;
    gameState.log.push({text: `You hold no Politburo seat. Without institutional protection, you are dangerously exposed.`, important: true});
  }

  // CUNNING
  survivalChance += (gameState.cunning - 50) * 0.004;

  // LOYALTY (era-dependent) — with harsher requirements in Stalin eras
  const authoritarianEras = ['Stalin consolidating','Collectivization','Pre-Terror','Post-Terror','Late Stalin'];
  const reformEras = ['Thaw','Perestroika','Collapse'];
  const terrorEras = ['Pre-Terror','Post-Terror'];
  if (authoritarianEras.includes(congress.era)) {
    survivalChance += (gameState.loyalty - 50) * 0.005; // was 0.004
    if (gameState.loyalty < 20) {
      survivalChance -= 0.35;
      gameState.log.push({text: `Your disloyalty is suicidal. The NKVD will come for you.`, important: true});
    } else if (gameState.loyalty < 40) {
      survivalChance -= 0.25;
      gameState.log.push({text: `Your insufficient loyalty draws suspicion from the security organs.`, important: true});
    }
    // Terror eras demand even higher loyalty
    if (terrorEras.includes(congress.era) && gameState.loyalty < 60) {
      survivalChance -= 0.10;
      gameState.log.push({text: `In the Terror, even moderate loyalty is not enough. Only fanatics feel safe.`, important: true});
    }
  } else if (reformEras.includes(congress.era)) {
    if (gameState.loyalty > 80) {
      survivalChance -= 0.08; // was -0.05
      gameState.log.push({text: `Your rigid orthodoxy puts you at odds with the reformers.`, important: false});
    }
  } else {
    survivalChance += (gameState.loyalty - 50) * 0.002;
  }

  // ORTHODOXY SCORE (accumulated ideological baggage)
  // In authoritarian eras, orthodoxy is rewarded; in reform eras, it's deadly
  if (authoritarianEras.includes(congress.era)) {
    survivalChance += gameState.orthodoxy * 0.003;
  } else if (congress.era === 'Thaw') {
    survivalChance -= gameState.orthodoxy * 0.003;
    if (gameState.orthodoxy > 50) {
      gameState.log.push({text: `De-Stalinization threatens those who were most loyal to the old regime. Your orthodox record is a liability.`, important: true});
    }
  } else if (congress.era === 'Khrushchev') {
    survivalChance -= gameState.orthodoxy * 0.002;
  } else if (['Brezhnev','Stagnation','Late Brezhnev'].includes(congress.era)) {
    survivalChance -= gameState.orthodoxy * 0.001;
  } else if (congress.era === 'Perestroika') {
    survivalChance -= gameState.orthodoxy * 0.004;
    if (gameState.orthodoxy > 40) {
      gameState.log.push({text: `Glasnost exposes the crimes of the past. Your orthodox commitments come back to haunt you.`, important: true});
    }
  } else if (congress.era === 'Collapse') {
    survivalChance -= gameState.orthodoxy * 0.005;
    if (gameState.orthodoxy > 30) {
      gameState.log.push({text: `The Party is dying. Those most identified with its worst excesses have nowhere to hide.`, important: true});
    }
  }

  // REPUTATION
  if (authoritarianEras.includes(congress.era) && gameState.reputation > 75) {
    survivalChance -= 0.08;
    gameState.log.push({text: `Your prominence makes you a target. The leader distrusts those who shine too brightly.`, important: true});
  } else if (gameState.reputation > 60) {
    survivalChance += 0.03;
  }
  if (gameState.reputation < 20) {
    survivalChance -= 0.05;
  }

  // FACTION ALIGNMENT BONUS/PENALTY
  // Being too far left during Stalin's consolidation, or too right during reform, is dangerous
  const isTransitionEra = ['Thaw','Perestroika'].includes(congress.era);
  const factionPenaltyMultiplier = isTransitionEra ? 2.0 : 1.0; // transition eras double faction penalties
  if (authoritarianEras.includes(congress.era)) {
    if (gameState.factionEcon < 25) { // Too leftist after Stalin wins
      survivalChance -= 0.05;
    }
    if (gameState.factionPolicy < 25) { // Too dovish under Stalin
      survivalChance -= 0.03;
    }
    if (gameState.factionPolicy > 80) { // Too hawkish (overcommitted, seen as rival)
      survivalChance -= 0.02;
    }
  } else if (reformEras.includes(congress.era)) {
    if (gameState.factionPolicy > 80) { // Too hawkish under reforms
      survivalChance -= 0.05 * factionPenaltyMultiplier;
    }
    if (gameState.factionEcon < 25) { // Too statist under reform
      survivalChance -= 0.03 * factionPenaltyMultiplier;
    }
  }
  // Brezhnev era: too rightist is suspicious
  if (['Brezhnev','Stagnation','Late Brezhnev'].includes(congress.era)) {
    if (gameState.factionEcon > 75) {
      survivalChance -= 0.03;
    }
  }

  // ALLIANCE MODIFIER
  survivalChance += getAllianceSurvivalMod();

  // STAT COMBOS
  if (gameState.cunning > 65 && gameState.loyalty >= 40 && gameState.loyalty <= 75) {
    survivalChance += 0.05;
  }
  if (gameState.loyalty < 25 && gameState.cunning < 25 && gameState.reputation < 25) {
    survivalChance -= 0.2;
    gameState.log.push({text: `You have no allies, no skills, and no standing. The end is near.`, important: true});
  }

  // Historical fate modifier
  const char = gameState.character;
  if (char.fate === 'E' || char.fate === 'A' || char.fate === 'S') {
    const yearsUntilDeath = char.died - congress.year;
    if (yearsUntilDeath <= 2 && yearsUntilDeath >= 0) {
      survivalChance -= 0.2;
      gameState.log.push({text: `The political winds turn against you. History closes in...`, important: true});
    } else if (yearsUntilDeath <= 5 && yearsUntilDeath >= 0) {
      survivalChance -= 0.1;
    }
  }

  if (gameState.cunning < 20) survivalChance -= 0.1;

  survivalChance = clamp(survivalChance, 0.05, 0.98);

  const roll = Math.random();
  if (roll > survivalChance) {
    gameState.alive = false;
    gameState.phase = 'gameover';
    gameState.deathText = generateDeathText(congress, choice);
    render();
    return;
  }

  // Survived — show Pravda then advance
  showPravda(congress, choice);
}

function advanceCongress() {
  // This is now only called for auto-advance (no scenario). Normal flow uses showPravda -> dismissPravda -> proceedToNextCongress
  showPravda(congresses[gameState.congressIndex], null);
}

function generateDeathText(congress, choice) {
  const char = gameState.character;
  const era = congress.era;

  const purgeTexts = {
    'Civil War': `In the chaos of the Civil War, your political misstep proved fatal. ${char.n} was removed from the Politburo and consigned to obscurity\u2014or worse.`,
    'NEP': `Your opposition to the party line during the NEP period marked you as unreliable. ${char.n} was sidelined and stripped of influence.`,
    'Succession': `The succession struggle after Lenin's death was unforgiving. ${char.n} backed the wrong faction and paid the price. Your name was struck from party history.`,
    'Stalin consolidating': `As Stalin consolidated total power, ${char.n} was cast out of the inner circle. The charge: 'factional activity.' The sentence: political death, and perhaps worse.`,
    'Collectivization': `During the brutal collectivization campaign, ${char.n} was accused of 'right-opportunism' and 'sabotage.' Your protests of loyalty fell on deaf ears.`,
    'Pre-Terror': `At the Congress of Victors, you made the wrong enemies. ${char.n} would soon find their name on an arrest list. The NKVD knocked at dawn.`,
    'Post-Terror': `The Great Terror consumed ${char.n}. Like so many others, you were denounced, arrested, forced to confess to absurd conspiracies, and eliminated. Your name was erased from photographs.`,
    'Late Stalin': `In Stalin's paranoid final years, ${char.n} fell under suspicion. The aging dictator's court was a snake pit where no one was safe. You did not survive it.`,
    'Thaw': `The post-Stalin thaw brought new dangers for those who had been complicit in the old crimes. ${char.n} was swept aside as the party reinvented itself.`,
    'Khrushchev': `Khrushchev's erratic leadership created winners and losers. ${char.n} ended up on the wrong side of the latest reorganization.`,
    'Brezhnev': `In the Brezhnev era, ${char.n} was quietly retired\u2014stripped of posts, given a meaningless pension, and forgotten. The nomenklatura's version of political death.`,
    'Stagnation': `During the era of stagnation, ${char.n} was eased out of the leadership. No dramatic purge\u2014just a quiet disappearance from the official photographs.`,
    'Late Brezhnev': `As the old guard crumbled, ${char.n} was pushed aside in the succession maneuvering. The new generation had no use for you.`,
    'Perestroika': `Gorbachev's reforms swept away the old order. ${char.n} could not adapt to the new era of glasnost and was removed from the Politburo.`,
    'Collapse': `As the Soviet Union collapsed around you, ${char.n} found themselves on the wrong side of history. The party that had been your life ceased to exist.`
  };

  return purgeTexts[era] || `${char.n} did not survive the political upheaval of the ${congress.name}. The Soviet system, which you had served, consumed you.`;
}

function generateBiography() {
  const char = gameState.character;
  const decisions = gameState.decisions;
  const survived = gameState.phase === 'gameover' && gameState.congressIndex >= congresses.length - 1;
  const deathCongress = !survived ? congresses[gameState.congressIndex] : null;

  // ====== ACHIEVEMENTS ======
  const earned = [];
  const congressesSurvived = gameState.congressIndex;

  // Survival achievements (mutually exclusive tiers)
  if (survived) {
    earned.push({icon: '☆', title: 'Survivor of the Soviet Century', desc: 'Navigated all 22 Congresses from 1918 to 1990 — one of history\'s great survivors'});
  } else if (congressesSurvived >= 15) {
    earned.push({icon: '★', title: 'Old Guard', desc: `Survived ${congressesSurvived} Congresses — outlasted most of your peers`});
  } else if (congressesSurvived >= 10) {
    earned.push({icon: '★', title: 'Old Bolshevik', desc: `Survived ${congressesSurvived} Congresses — a veteran of Soviet politics`});
  } else if (congressesSurvived >= 5) {
    earned.push({icon: '✶', title: 'Entrenched', desc: `Survived ${congressesSurvived} Congresses — you know how the game is played`});
  } else if (congressesSurvived <= 1 && !survived) {
    earned.push({icon: '☠', title: 'Flash in the Pan', desc: 'Purged at your first or second Congress — the party chews up the naive'});
  }

  // Stat achievements (higher thresholds, harder to earn)
  if (gameState.maxLoyalty >= 95) {
    earned.push({icon: '⚑', title: 'Fanatical Devotion', desc: 'Reached 95+ Loyalty — more devout than a Bolshevik priest'});
  } else if (gameState.maxLoyalty >= 85) {
    earned.push({icon: '⚑', title: 'True Believer', desc: 'Reached 85+ Loyalty — the party\'s most devoted servant'});
  }
  if (gameState.maxCunning >= 90) {
    earned.push({icon: '⚔', title: 'Kremlin Grandmaster', desc: 'Reached 90+ Cunning — you could outmaneuver Machiavelli himself'});
  } else if (gameState.maxCunning >= 80) {
    earned.push({icon: '⚔', title: 'Master Intriguer', desc: 'Reached 80+ Cunning — the corridors of power hold no secrets from you'});
  }
  if (gameState.maxReputation >= 90) {
    earned.push({icon: '☆', title: 'Legend of the Revolution', desc: 'Reached 90+ Reputation — your name is spoken with reverence'});
  } else if (gameState.maxReputation >= 80) {
    earned.push({icon: '☆', title: 'People\'s Hero', desc: 'Reached 80+ Reputation — a figure of genuine stature'});
  }

  // Multi-stat achievements (very hard)
  const L = gameState.loyalty, C = gameState.cunning, R = gameState.reputation;
  if (L >= 75 && C >= 70 && R >= 60) {
    earned.push({icon: '♠', title: 'The Complete Apparatchik', desc: 'Ended with Loyalty 75+, Cunning 70+, Reputation 60+ simultaneously — the perfect Soviet politician'});
  }
  if (L <= 20 && C >= 70) {
    earned.push({icon: '🗡', title: 'The Double Agent', desc: 'Disloyal but brilliant — you served yourself while pretending to serve the state'});
  }
  if (L >= 70 && R >= 70 && C <= 35) {
    earned.push({icon: '✧', title: 'The Honest Servant', desc: 'Loyal and respected but politically unsophisticated — a rare and endangered species'});
  }

  // Extreme stat lows
  if (gameState.minLoyalty <= 10) earned.push({icon: '✗', title: 'Enemy of the People', desc: 'Loyalty dropped below 10 — the NKVD has a thick file on you'});
  if (L <= 15 && C <= 15 && R <= 15) earned.push({icon: '💀', title: 'Political Nonentity', desc: 'All stats below 15 — you had nothing and no one'});

  // Playstyle achievements (higher thresholds)
  if (gameState.betrayalCount >= 5) {
    earned.push({icon: '☠', title: 'Architect of Purges', desc: `Betrayed ${gameState.betrayalCount} allies — you made betrayal an art form`});
  } else if (gameState.betrayalCount >= 3) {
    earned.push({icon: '☠', title: 'Judas of the Presidium', desc: `Betrayed ${gameState.betrayalCount} allies — trust means nothing to you`});
  }
  if (gameState.betrayalCount === 0 && gameState.alliancesFormed >= 5) {
    earned.push({icon: '❤', title: 'Loyal Comrade', desc: 'Formed 5+ alliances and never betrayed a single one'});
  }
  if (gameState.alliancesFormed >= 12) {
    earned.push({icon: '★', title: 'Master of Networks', desc: `Formed ${gameState.alliancesFormed} alliances — your web spans the entire party`});
  } else if (gameState.alliancesFormed >= 8) {
    earned.push({icon: '★', title: 'Network Builder', desc: `Formed ${gameState.alliancesFormed} alliances — a skilled political connector`});
  }
  if (gameState.alliancesFormed === 0 && congressesSurvived >= 5) {
    earned.push({icon: '●', title: 'Lone Wolf', desc: 'Survived 5+ Congresses without forming a single alliance'});
  }
  if (gameState.lowSurvivalChoices >= 8) {
    earned.push({icon: '☘', title: 'Revolutionary Daredevil', desc: `Chose ${gameState.lowSurvivalChoices} high-risk options — you live on the edge`});
  } else if (gameState.lowSurvivalChoices >= 5) {
    earned.push({icon: '☘', title: 'Gambler', desc: `Chose ${gameState.lowSurvivalChoices} high-risk options — fortune favors the bold`});
  }
  if (gameState.lowSurvivalChoices === 0 && congressesSurvived >= 8) {
    earned.push({icon: '🛡', title: 'The Cautious', desc: 'Never chose a high-risk option — you played it safe and lived'});
  }
  if (gameState.crisesSurvived >= 5) {
    earned.push({icon: '⚡', title: 'Unbreakable', desc: `Weathered ${gameState.crisesSurvived} emergency crises — nothing shakes you`});
  } else if (gameState.crisesSurvived >= 3) {
    earned.push({icon: '⚡', title: 'Crisis Veteran', desc: `Weathered ${gameState.crisesSurvived} emergency crises`});
  }
  if (gameState.dossiersSurvived >= 4) {
    earned.push({icon: '✉', title: 'Spymaster', desc: `Navigated ${gameState.dossiersSurvived} secret intelligence encounters — you know where the bodies are buried`});
  } else if (gameState.dossiersSurvived >= 2) {
    earned.push({icon: '✉', title: 'Dossier Survivor', desc: `Navigated ${gameState.dossiersSurvived} secret intelligence encounters`});
  }

  // Continuity achievements
  const tags = gameState.continuityTags || [];
  if (tags.length >= 8) {
    earned.push({icon: '🔗', title: 'Thread of History', desc: `Your choices echoed across ${tags.length} different eras — a career of consistent consequences`});
  } else if (tags.length >= 4) {
    earned.push({icon: '🔗', title: 'Long Memory', desc: `${tags.length} of your decisions had lasting political consequences`});
  }
  if (tags.includes('cultivated_stalin') && tags.includes('embraced_destalinization')) {
    earned.push({icon: '🎭', title: 'The Turncoat', desc: 'Cultivated Stalin then embraced de-Stalinization — the ultimate political survivor'});
  }
  if (tags.includes('backed_brest_litovsk') && tags.includes('walked_out_with_yeltsin')) {
    earned.push({icon: '📜', title: 'Alpha and Omega', desc: 'Supported Lenin\'s first great compromise and witnessed the Party\'s final act'});
  }

  // Era-specific achievements (more specific)
  const erasVisited = [...new Set(decisions.map(d => d.era))];
  const terrorEras = ['Stalin consolidating', 'Collectivization', 'Pre-Terror', 'Post-Terror'];
  const terrorCount = erasVisited.filter(e => terrorEras.includes(e)).length;
  if (terrorCount >= 3) {
    earned.push({icon: '☢', title: 'Survived the Terror', desc: 'Lived through multiple years of Stalin\'s most dangerous purge eras'});
  }
  if (erasVisited.includes('Collapse') && survived) {
    earned.push({icon: '⚐', title: 'Witnessed the Fall', desc: 'Saw the Soviet Union dissolve from inside the Politburo'});
  }
  if (erasVisited.includes('Civil War') && erasVisited.includes('Collapse')) {
    earned.push({icon: '∞', title: 'Eternal Commissar', desc: 'Present from the Civil War to the Collapse — 72 years of Soviet power'});
  }

  // Faction achievements (more extreme thresholds)
  const econLabel = getFactionLabel(gameState.factionEcon, 'Leftist', 'Rightist');
  const policyLabel = getFactionLabel(gameState.factionPolicy, 'Dove', 'Hawk');
  if (gameState.factionEcon <= 15) earned.push({icon: '☭', title: 'Ultra-Left', desc: 'The most committed economic leftist — state control above everything'});
  else if (gameState.factionEcon < 30) earned.push({icon: '☭', title: 'Left Deviationist', desc: 'A committed economic leftist — state control above all'});
  if (gameState.factionEcon >= 85) earned.push({icon: '⚖', title: 'Closet Capitalist', desc: 'An extreme advocate for market forces — practically a capitalist roader'});
  else if (gameState.factionEcon > 70) earned.push({icon: '⚖', title: 'Right Deviationist', desc: 'An advocate for market forces within socialism'});
  if (gameState.factionPolicy >= 85) earned.push({icon: '⚔', title: 'Iron Fist', desc: 'An extreme hardliner who believed only in strength'});
  if (gameState.factionPolicy <= 15) earned.push({icon: '⚘', title: 'Radical Reformer', desc: 'A committed dove who pushed for peaceful solutions above all'});

  // Mode achievements
  if (gameState.mode === 'iron_curtain' && survived) earned.push({icon: '█', title: 'Blind Survivor', desc: 'Completed the game in Iron Curtain mode without seeing stats'});
  if (gameState.mode === 'iron_curtain' && congressesSurvived >= 10) earned.push({icon: '▓', title: 'Instinct', desc: 'Survived 10+ Congresses blind — pure political intuition'});
  if (gameState.mode === 'speed_run' && survived) {
    const elapsed = Math.round((Date.now() - gameState.speedRunStart) / 1000);
    earned.push({icon: '⏚', title: 'Speed Survivor', desc: `Completed speed run in ${Math.floor(elapsed/60)}m ${elapsed%60}s`});
  }

  // ====== ARCHETYPE (based on achievements and stats) ======
  let archetype = '';
  let historicalParallel = '';
  // L, C, R already declared above
  if (L >= 65 && C >= 55) { archetype = 'The Apparatchik'; historicalParallel = 'Like Kaganovich, you mastered the party machine and survived through institutional loyalty.'; }
  else if (gameState.betrayalCount >= 3 && C >= 60) { archetype = 'The Judas'; historicalParallel = 'Like Beria, you rose by betraying those who trusted you. Everyone feared you, and no one mourned you.'; }
  else if (L >= 70 && R < 40) { archetype = 'The Yes-Man'; historicalParallel = 'Like Voroshilov, you survived by never contradicting the boss.'; }
  else if (C >= 65 && L < 40) { archetype = 'The Schemer'; historicalParallel = 'Like Malenkov, you played every angle and trusted no one.'; }
  else if (R >= 65 && C >= 50) { archetype = 'The Statesman'; historicalParallel = 'Like Mikoian, you combined political skill with genuine stature.'; }
  else if (R >= 70 && L < 40) { archetype = 'The Dissident'; historicalParallel = 'Like Bukharin, your principled stands won admiration but made deadly enemies.'; }
  else if (gameState.lowSurvivalChoices >= 5) { archetype = 'The Revolutionary Gambler'; historicalParallel = 'Like Trotsky, you took bold risks. Sometimes brilliance and recklessness are hard to tell apart.'; }
  else if (gameState.alliancesFormed === 0) { archetype = 'The Lone Wolf'; historicalParallel = 'Like Suslov, you operated alone in the shadows, owing nothing to anyone.'; }
  else if (L >= 65) { archetype = 'The Loyal Servant'; historicalParallel = 'Like Kalinin, your devotion to the party line kept you safe.'; }
  else if (C >= 60) { archetype = 'The Survivor'; historicalParallel = 'Like Molotov, your instinct for self-preservation was razor-sharp.'; }
  else if (R >= 60) { archetype = 'The Idealist'; historicalParallel = 'Like Kirov, your popularity was both asset and danger.'; }
  else { archetype = 'The Gray Cardinal'; historicalParallel = 'Like Suslov, you wielded quiet influence from the margins.'; }

  // ====== BUILD OUTPUT ======
  let bio = `<h3>${archetype}</h3>`;
  bio += `<p><strong>${char.n}</strong> (${char.born}\u2013${survived ? '1990s' : (deathCongress ? deathCongress.year : '?')})`;
  bio += ` &mdash; ${char.nat}. `;
  bio += `<strong>${econLabel} ${policyLabel}</strong>.</p>`;

  if (survived) {
    bio += `<p>Against all odds, ${char.n} survived every Congress from ${decisions[0]?.year || '1918'} to 1990.</p>`;
  } else {
    bio += `<p>${char.n}'s career ended at the ${deathCongress.name} (${deathCongress.year}), having survived ${gameState.congressIndex} Congress${gameState.congressIndex !== 1 ? 'es' : ''}.</p>`;
  }

  // Stats summary
  bio += `<p style="font-size:0.9em; color:#8a7a5a;">Final: Loyalty ${L} | Cunning ${C} | Reputation ${R}</p>`;

  // Achievements grid with CK2-style badges
  const badgeMap = {
    'Survivor of the Soviet Century': 'survivor-of-soviet-century',
    'Old Guard': 'old-guard',
    'Old Bolshevik': 'old-bolshevik',
    'Entrenched': 'entrenched',
    'Flash in the Pan': 'flash-in-the-pan',
    'Fanatical Devotion': 'fanatical-devotion',
    'True Believer': 'true-believer',
    'Kremlin Grandmaster': 'kremlin-grandmaster',
    'Master Intriguer': 'master-intriguer',
    'Legend of the Revolution': 'legend-of-revolution',
    "People's Hero": 'peoples-hero',
    'The Complete Apparatchik': 'complete-apparatchik',
    'The Double Agent': 'double-agent',
    'The Honest Servant': 'honest-servant',
    'Enemy of the People': 'enemy-of-the-people',
    'Political Nonentity': 'political-nonentity',
    'Architect of Purges': 'architect-of-purges',
    'Judas of the Presidium': 'judas-of-presidium',
    'Loyal Comrade': 'loyal-comrade',
    'Master of Networks': 'master-of-networks',
    'Network Builder': 'network-builder',
    'Lone Wolf': 'lone-wolf',
    'Revolutionary Daredevil': 'revolutionary-daredevil',
    'Gambler': 'gambler',
    'The Cautious': 'the-cautious',
    'Unbreakable': 'unbreakable',
    'Crisis Veteran': 'crisis-veteran',
    'Spymaster': 'spymaster',
    'Dossier Survivor': 'dossier-survivor',
    'Thread of History': 'thread-of-history',
    'Long Memory': 'long-memory',
    'The Turncoat': 'the-turncoat',
    'Alpha and Omega': 'alpha-and-omega',
    'Survived the Terror': 'survived-the-terror',
    'Witnessed the Fall': 'witnessed-the-fall',
    'Eternal Commissar': 'eternal-commissar',
    'Ultra-Left': 'ultra-left',
    'Left Deviationist': 'left-deviationist',
    'Closet Capitalist': 'closet-capitalist',
    'Right Deviationist': 'right-deviationist',
    'Iron Fist': 'iron-fist',
    'Radical Reformer': 'radical-reformer',
    'Blind Survivor': 'blind-survivor',
    'Instinct': 'instinct',
    'Speed Survivor': 'speed-survivor',
  };
  if (earned.length > 0) {
    bio += `<div style="margin: 15px 0;">`;
    bio += `<h4 style="color:#ffd700; font-family:'Special Elite',cursive; margin-bottom:10px;">Achievements Earned (${earned.length})</h4>`;
    bio += `<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">`;
    earned.forEach(a => {
      const badgeFile = badgeMap[a.title];
      const badgeImg = badgeFile
        ? `<img src="images/badges/${badgeFile}.png" style="width:64px;height:64px;border:2px solid #5a4a2a;border-radius:4px;image-rendering:auto;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : '';
      const fallbackIcon = `<div style="width:64px;height:64px;background:rgba(20,10,5,0.9);border:2px solid #5a4a2a;border-radius:4px;display:${badgeFile ? 'none' : 'flex'};align-items:center;justify-content:center;font-size:1.8em;">${a.icon}</div>`;
      bio += `<div style="background:rgba(30,15,10,0.8); border:1px solid #3a2a1a; border-radius:6px; padding:10px; display:flex; gap:10px; align-items:center;">`;
      bio += `<div style="flex-shrink:0;">${badgeImg}${fallbackIcon}</div>`;
      bio += `<div style="flex:1;min-width:0;">`;
      bio += `<div style="color:#ffd700; font-size:1em; font-family:'Special Elite',cursive;">${a.title}</div>`;
      bio += `<div style="color:#8a7a5a; font-size:0.78em; margin-top:3px; line-height:1.3;">${a.desc}</div>`;
      bio += `</div></div>`;
    });
    bio += `</div></div>`;
  }

  // Historical parallel and real fate
  bio += `<p><em>${historicalParallel}</em></p>`;
  bio += `<p class="historical-note"><em>In real history, ${char.n} ${fateDescription(char).toLowerCase()}.</em></p>`;

  if (gameState.mode !== 'standard') {
    const modeNames = {iron_curtain: 'Iron Curtain', speed_run: 'Speed Run'};
    bio += `<p class="historical-note"><strong>Mode: ${modeNames[gameState.mode]}</strong></p>`;
  }

  return bio;
}

function restartGame() {
  document.getElementById('outcome-overlay').classList.remove('active');
  document.getElementById('pravda-overlay').classList.remove('active');
  document.getElementById('dossier-overlay').classList.remove('active');
  if (speedTimerInterval) { clearInterval(speedTimerInterval); speedTimerInterval = null; }
  gameState = {
    phase: 'title',
    character: null,
    congressIndex: 0,
    loyalty: 50,
    cunning: 50,
    reputation: 50,
    alive: true,
    log: [],
    decisions: [],
    congressResults: [],
    mode: 'standard',
    factionEcon: 50,
    factionPolicy: 50,
    alliances: {},
    allianceSlots: 3,
    lastPravdaHeadlines: [],
    crisisThisCongress: false,
    speedRunStart: null,
    speedRunChoiceTime: 15,
    scenarioCongressNum: null,
    continuityTags: [],
    previousMembers: [],
    achievements: [],
    betrayalCount: 0,
    alliancesFormed: 0,
    crisesSurvived: 0,
    dossiersSurvived: 0,
    maxLoyalty: 50,
    maxCunning: 50,
    maxReputation: 50,
    minLoyalty: 50,
    lowSurvivalChoices: 0
  };
  render();
}

// ============================================================
// MUSIC CONTROLS
// ============================================================
function toggleMusic() {
  const playing = SovietMusic.toggle();
  const btn = document.getElementById('music-btn');
  btn.textContent = playing ? '\u266B Music: ON' : '\u266B Music: OFF';
  btn.classList.toggle('playing', playing);
}

// ============================================================
// INIT
// ============================================================
render();
</script>
